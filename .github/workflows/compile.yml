name: Build ESP32 Firmware

on:
  push:
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: ubuntu-latest

    steps:

    # -------------------------
    # Checkout repository
    # -------------------------
    - name: Checkout repository
      uses: actions/checkout@v5

    # -------------------------
    # Install Arduino CLI
    # -------------------------
    - name: Install Arduino CLI
      run: |
        curl -fsSL https://raw.githubusercontent.com/arduino/arduino-cli/master/install.sh | sh
        sudo mv bin/arduino-cli /usr/local/bin/

        arduino-cli version

    # -------------------------
    # Setup ESP32 Core
    # -------------------------
    - name: Setup ESP32 Core
      run: |
        arduino-cli config init || true

        arduino-cli config add board_manager.additional_urls \
        https://raw.githubusercontent.com/espressif/arduino-esp32/gh-pages/package_esp32_index.json || true

        arduino-cli core update-index

        arduino-cli core install esp32:esp32@2.0.17

    # -------------------------
    # Install NimBLE
    # -------------------------
    - name: Install NimBLE
      run: |
        mkdir -p ~/Arduino/libraries
        cd ~/Arduino/libraries

        git clone https://github.com/h2zero/NimBLE-Arduino.git

    # -------------------------
    # Install Required Libraries
    # -------------------------
    - name: Install required libraries
      run: |
        arduino-cli lib install "PubSubClient"
        arduino-cli lib install "ESP32Servo"

    # -------------------------
    # Compile Firmware
    # -------------------------
    - name: Compile firmware
      run: |
        mkdir -p build

        arduino-cli compile \
          --fqbn esp32:esp32:esp32:PartitionScheme=huge_app \
          --output-dir build \
          .

    # -------------------------
    # Debug build output
    # -------------------------
    - name: Show build files
      run: |
        echo "==== BUILD FILES ===="
        find build -type f

    # -------------------------
    # Prepare firmware + merged bin
    # -------------------------
    - name: Prepare firmware
      run: |

        set -e

        mkdir -p firmware

        # Copy all build binaries
        find build -name "*.bin" -exec cp {} firmware/ \;

        # Install esptool
        pip install esptool

        # Detect files safely
        BOOT=$(find build -name "*bootloader*.bin" | head -n 1)
        PART=$(find build -name "*partitions*.bin" | head -n 1)
        APP=$(find build -name "*.ino.bin" | head -n 1)

        echo "BOOTLOADER: $BOOT"
        echo "PARTITIONS: $PART"
        echo "APP: $APP"

        # Check files exist
        test -f "$BOOT"
        test -f "$PART"
        test -f "$APP"

        # Create merged firmware
        esptool.py --chip esp32 merge_bin -o firmware/merged.bin \
          0x1000 "$BOOT" \
          0x8000 "$PART" \
          0x10000 "$APP"

        echo "Merged firmware created"

    # -------------------------
    # Upload all firmware files
    # -------------------------
    - name: Upload firmware
      uses: actions/upload-artifact@v5
      with:
        name: esp32-firmware
        path: firmware
