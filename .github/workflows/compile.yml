name: Build ESP32 Firmware

on:
  push:
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: ubuntu-latest

    steps:

    # -------------------------
    # Checkout repository
    # -------------------------
    - name: Checkout repository
      uses: actions/checkout@v5

    # -------------------------
    # Cache Arduino Core + Libraries + Build Cache
    # -------------------------
    - name: Cache Arduino data
      uses: actions/cache@v4
      with:
        path: |
          ~/.arduino15
          ~/Arduino
          ~/.cache
        key: arduino-${{ runner.os }}-esp32-2.0.17-v2
        restore-keys: |
          arduino-${{ runner.os }}-esp32-2.0.17

    # -------------------------
    # Install Arduino CLI
    # -------------------------
    - name: Install Arduino CLI
      run: |
        if ! command -v arduino-cli &> /dev/null; then
          curl -fsSL https://raw.githubusercontent.com/arduino/arduino-cli/master/install.sh | sh
          sudo mv bin/arduino-cli /usr/local/bin/
        fi

        arduino-cli version

    # -------------------------
    # Setup ESP32 Core
    # -------------------------
    - name: Setup ESP32 Core
      run: |
        arduino-cli config init || true

        arduino-cli config add board_manager.additional_urls \
        https://raw.githubusercontent.com/espressif/arduino-esp32/gh-pages/package_esp32_index.json || true

        arduino-cli core update-index

        if ! arduino-cli core list | grep -q esp32; then
          arduino-cli core install esp32:esp32@2.0.17
        else
          echo "ESP32 core already installed"
        fi

    # -------------------------
    # Install NimBLE
    # -------------------------
    - name: Install NimBLE
      run: |
        mkdir -p ~/Arduino/libraries

        if [ ! -d ~/Arduino/libraries/NimBLE-Arduino ]; then
          cd ~/Arduino/libraries
          git clone https://github.com/h2zero/NimBLE-Arduino.git
        else
          echo "NimBLE already cached"
        fi

    # -------------------------
    # Install Required Libraries
    # -------------------------
    - name: Install required libraries
      run: |
        arduino-cli lib list | grep -q PubSubClient || \
          arduino-cli lib install "PubSubClient"

        arduino-cli lib list | grep -q ESP32Servo || \
          arduino-cli lib install "ESP32Servo"

    # -------------------------
    # Compile Firmware
    # -------------------------
    - name: Compile firmware
      run: |
        arduino-cli compile \
          --fqbn esp32:esp32:esp32:PartitionScheme=huge_app \
          --build-cache-path ~/.arduino15/cache \
          --jobs 4 \
          --output-dir build \
          .

    # -------------------------
    # Prepare firmware + merged bin
    # -------------------------
    - name: Prepare firmware
      run: |

        mkdir -p firmware

        # Copy all .bin files
        cp build/*.bin firmware/

        # Install esptool
        pip install esptool

        # Detect required files
        BOOT=$(ls build/*bootloader*.bin | head -n 1)
        PART=$(ls build/*partitions*.bin | head -n 1)
        APP=$(ls build/*.ino.bin | head -n 1)

        echo "Bootloader: $BOOT"
        echo "Partition: $PART"
        echo "App: $APP"

        # Create merged firmware
        esptool.py --chip esp32 merge_bin -o firmware/merged.bin \
          0x1000 $BOOT \
          0x8000 $PART \
          0x10000 $APP

        echo "Merged firmware created"

    # -------------------------
    # Upload ALL firmware files
    # -------------------------
    - name: Upload firmware (all)
      uses: actions/upload-artifact@v5
      with:
        name: esp32-firmware
        path: firmware

    # -------------------------
    # Upload merged.bin separately (easy download)
    # -------------------------
    - name: Upload merged firmware
      uses: actions/upload-artifact@v5
      with:
        name: esp32-merged
        path: firmware/merged.bin
