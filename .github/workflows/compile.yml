name: Build ESP32 Firmware

on:
  push:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      # -------------------------
      # Cache Arduino CLI installation
      # -------------------------
      - name: Cache Arduino CLI and data
        uses: actions/cache@v3
        with:
          path: |
            ~/.arduino15
            ~/.arduinoIDE
          key: ${{ runner.os }}-arduino-cli-${{ hashFiles('**/*.ino') }}
          restore-keys: |
            ${{ runner.os }}-arduino-cli-

      # -------------------------
      # Install Arduino CLI if missing
      # -------------------------
      - name: Install Arduino CLI
        if: steps.cache.outputs.cache-hit != 'true'
        run: |
          curl -fsSL https://raw.githubusercontent.com/arduino/arduino-cli/master/install.sh | sh
          sudo mv bin/arduino-cli /usr/local/bin/

      # -------------------------
      # Configure Arduino CLI
      # -------------------------
      - name: Setup Arduino CLI
        run: |
          arduino-cli config init
          arduino-cli core update-index

      # -------------------------
      # Install ESP32 core (skipped if cached)
      # -------------------------
      - name: Install ESP32 core
        run: |
          arduino-cli core install esp32:esp32 || echo "Core already installed"

      # -------------------------
      # Install required libraries (skipped if cached)
      # -------------------------
      - name: Install required libraries
        run: |
          for lib in "ArduinoJson" "ArduinoWebsockets" "WiFi" "Preferences" "BluetoothSerial" "PubSubClient"; do
            arduino-cli lib install "$lib" || echo "$lib already installed"
          done

      # -------------------------
      # Compile firmware
      # -------------------------
      - name: Compile firmware
        run: |
          arduino-cli compile \
            --fqbn esp32:esp32:esp32:PartitionScheme=huge_app \
            --output-dir build \
            .

      # -------------------------
      # Prepare flash files
      # -------------------------
      - name: Prepare flash files
        run: |
          mkdir firmware
          cp build/*.bin firmware/

      # -------------------------
      # Upload firmware as artifact
      # -------------------------
      - name: Upload firmware
        uses: actions/upload-artifact@v4
        with:
          name: esp32-firmware
          path: firmware
