name: Build ESP32-WROOM-32 Firmware

on:
  push:
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: ubuntu-latest

    steps:

      # -------------------------
      # Checkout repository
      # -------------------------
      - name: Checkout repository
        uses: actions/checkout@v5

      # -------------------------
      # Install Arduino CLI
      # -------------------------
      - name: Install Arduino CLI
        run: |
          curl -fsSL https://raw.githubusercontent.com/arduino/arduino-cli/master/install.sh | sh
          sudo mv bin/arduino-cli /usr/local/bin/

      # -------------------------
      # Configure ESP32 Core
      # -------------------------
      - name: Setup ESP32 Core
        run: |
          arduino-cli config init

          arduino-cli config add board_manager.additional_urls \
          https://raw.githubusercontent.com/espressif/arduino-esp32/gh-pages/package_esp32_index.json

          arduino-cli core update-index

          # Install stable ESP32 core with NimBLE
          arduino-cli core install esp32:esp32@2.0.17

      # -------------------------
      # Install Required Libraries
      # -------------------------
      - name: Install Libraries
        run: |
          arduino-cli lib update-index

          arduino-cli lib install "ArduinoJson"
          arduino-cli lib install "PubSubClient"
          arduino-cli lib install "ArduinoWebsockets"

      # -------------------------
      # Compile Firmware
      # -------------------------
      - name: Compile Firmware
        run: |
          arduino-cli compile \
            --fqbn esp32:esp32:esp32:FlashMode=dio,FlashFreq=80,PartitionScheme=huge_app \
            --build-property upload.maximum_size=3145728 \
            --output-dir build \
            .

      # -------------------------
      # Prepare Flash Files
      # -------------------------
      - name: Prepare Firmware Files
        run: |
          mkdir -p firmware

          cp build/*.bin firmware/

          echo "Firmware files:"
          ls firmware/

      # -------------------------
      # Upload Firmware Artifact
      # -------------------------
      - name: Upload Firmware
        uses: actions/upload-artifact@v5
        with:
          name: esp32-wroom32-firmware
          path: firmware
