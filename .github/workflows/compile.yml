name: Build ESP32 Firmware

on:
  push:
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true   # Force Node.js 24

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      # -------------------------
      # Checkout repository
      # -------------------------
      - name: Checkout repository
        uses: actions/checkout@v5

      # -------------------------
      # Install Arduino CLI
      # -------------------------
      - name: Install Arduino CLI
        run: |
          curl -fsSL https://raw.githubusercontent.com/arduino/arduino-cli/master/install.sh | sh
          sudo mv bin/arduino-cli /usr/local/bin/

      # -------------------------
      # Setup Arduino CLI
      # -------------------------
      - name: Setup Arduino CLI
        run: |
          arduino-cli config init
          arduino-cli core update-index
          arduino-cli core install esp32:esp32

      # -------------------------
      # Install required libraries
      # -------------------------
      - name: Install required libraries
        run: |
          # Standard libraries
          for lib in "ArduinoJson" "PubSubClient" "Preferences"; do
            arduino-cli lib install "$lib"
          done

          # NimBLE-Arduino latest release
          mkdir -p /tmp/nimble
          curl -L -o /tmp/nimble/NimBLE-Arduino.zip \
            https://github.com/h2zero/NimBLE-Arduino/releases/latest/download/NimBLE-Arduino.zip

          # Verify zip
          ls -lh /tmp/nimble/
          file /tmp/nimble/NimBLE-Arduino.zip

          # Unzip and install
          unzip -o /tmp/nimble/NimBLE-Arduino.zip -d /tmp/nimble/
          arduino-cli lib install /tmp/nimble/NimBLE-Arduino

      # -------------------------
      # Compile firmware
      # -------------------------
      - name: Compile firmware
        run: |
          arduino-cli compile \
            --fqbn esp32:esp32:esp32 \
            --build-property partition_scheme=huge_app \
            --output-dir build \
            .

      # -------------------------
      # Prepare flash files
      # -------------------------
      - name: Prepare flash files
        run: |
          mkdir -p firmware
          cp build/*.bin firmware/

      # -------------------------
      # Upload firmware as artifact
      # -------------------------
      - name: Upload firmware
        uses: actions/upload-artifact@v5
        with:
          name: esp32-firmware
          path: firmware
