name: Build ESP32 Firmware

on:
  push:
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: ubuntu-latest

    steps:

      # -------------------------
      # Checkout repository
      # -------------------------
      - name: Checkout repository
        uses: actions/checkout@v5

      # -------------------------
      # Install Arduino CLI
      # -------------------------
      - name: Install Arduino CLI
        run: |
          curl -fsSL https://raw.githubusercontent.com/arduino/arduino-cli/master/install.sh | sh
          sudo mv bin/arduino-cli /usr/local/bin/

      # -------------------------
      # Setup ESP32 Core
      # -------------------------
      - name: Setup ESP32 Core
        run: |
          arduino-cli config init

          arduino-cli config add board_manager.additional_urls \
          https://raw.githubusercontent.com/espressif/arduino-esp32/gh-pages/package_esp32_index.json

          arduino-cli core update-index

          arduino-cli core install esp32:esp32@2.0.17

      # -------------------------
      # Install NimBLE manually
      # -------------------------
      - name: Install NimBLE from GitHub
        run: |
          mkdir -p ~/Arduino/libraries
          cd ~/Arduino/libraries

          git clone https://github.com/h2zero/NimBLE-Arduino.git

      # -------------------------
      # Install Other Libraries
      # -------------------------
      - name: Install required libraries
        run: |
          arduino-cli lib install "ArduinoJson"
          arduino-cli lib install "PubSubClient"
          arduino-cli lib install "ArduinoWebsockets"

      # -------------------------
      # Compile Firmware
      # -------------------------
      - name: Compile firmware
        run: |
          arduino-cli compile \
            --fqbn esp32:esp32:esp32:PartitionScheme=huge_app \
            --output-dir build \
            .

      # -------------------------
      # Prepare firmware files
      # -------------------------
      - name: Prepare firmware
        run: |
          mkdir -p firmware
          cp build/*.bin firmware/

      # -------------------------
      # Upload artifact
      # -------------------------
      - name: Upload firmware
        uses: actions/upload-artifact@v5
        with:
          name: esp32-firmware
          path: firmware
