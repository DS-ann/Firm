name: Build TensorFlow ESP32 Example

on:
  push:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Arduino CLI
        uses: arduino/setup-arduino-cli@v2

      - name: Cache Arduino packages
        uses: actions/cache@v4
        with:
          path: |
            ~/.arduino15
            ~/Arduino
          key: ${{ runner.os }}-arduino-cache

      - name: Update Arduino index
        run: arduino-cli core update-index

      - name: Install ESP32 core
        run: arduino-cli core install esp32:esp32

      - name: Install TensorFlowLite ESP32
        run: |
          arduino-cli lib install --git-url https://github.com/tanakamasayuki/Arduino_TensorFlowLite_ESP32.git

      - name: Compile micro_speech example
        run: |
          arduino-cli compile \
          --fqbn esp32:esp32:nodemcu-32s \
          ~/Arduino/libraries/Arduino_TensorFlowLite_ESP32/examples/micro_speech

      - name: Upload firmware
        uses: actions/upload-artifact@v4
        with:
          name: esp32-micro-speech
          path: ~/Arduino/libraries/Arduino_TensorFlowLite_ESP32/examples/micro_speech/build
