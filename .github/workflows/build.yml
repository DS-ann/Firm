name: ESP32 Auto Arduino Build

on:
  push:
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Arduino CLI
        uses: arduino/setup-arduino-cli@v2

      - name: Cache Arduino packages
        uses: actions/cache@v4
        with:
          path: |
            ~/.arduino15
            ~/Arduino
          key: ${{ runner.os }}-arduino-cache

      - name: Update index
        run: arduino-cli core update-index

      - name: Install ESP32 core
        run: arduino-cli core install esp32:esp32

      - name: Install standard libraries
        run: |
          arduino-cli lib update-index
          arduino-cli lib install ArduinoJson || true
          arduino-cli lib install WiFi || true

      - name: Install TensorFlow ESP32 library
        run: |
          mkdir -p libraries
          git clone https://github.com/tanakamasayuki/Arduino_TensorFlowLite_ESP32.git libraries/Arduino_TensorFlowLite_ESP32

      - name: Detect sketch
        id: sketch
        run: |
          SKETCH=$(ls *.ino | head -n 1)
          echo "sketch=$SKETCH" >> $GITHUB_OUTPUT

      - name: Compile sketch
        run: |
          arduino-cli compile \
            --fqbn esp32:esp32:nodemcu-32s \
            --libraries libraries \
            --output-dir build \
            ${{ steps.sketch.outputs.sketch }}

      - name: Upload firmware
        uses: actions/upload-artifact@v4
        with:
          name: esp32-firmware
          path: build
