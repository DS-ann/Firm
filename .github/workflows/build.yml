name: Build ESP32 TensorFlow Firmware

on:
  push:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Arduino CLI
        uses: arduino/setup-arduino-cli@v2

      - name: Cache Arduino packages
        uses: actions/cache@v4
        with:
          path: |
            ~/.arduino15
            ~/Arduino
          key: ${{ runner.os }}-arduino-${{ hashFiles('**/*.ino') }}

      - name: Update Arduino index
        run: arduino-cli core update-index

      - name: Install ESP32 core
        run: arduino-cli core install esp32:esp32

      - name: Install TensorFlowLite ESP32 library
        run: |
          git clone https://github.com/tanakamasayuki/Arduino_TensorFlowLite_ESP32.git
          mkdir -p ~/Arduino/libraries
          mv Arduino_TensorFlowLite_ESP32 ~/Arduino/libraries/

      - name: Compile micro_speech example
        run: |
          arduino-cli compile \
          --fqbn esp32:esp32:nodemcu-32s \
          --output-dir build \
          ~/Arduino/libraries/Arduino_TensorFlowLite_ESP32/examples/micro_speech

      - name: Upload compiled firmware
        uses: actions/upload-artifact@v4
        with:
          name: esp32-tflite-micro-speech
          path: build
